<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Google Search Console Verification -->
  <!-- TODO: Replace YOUR_VERIFICATION_CODE with your Google Search Console verification code -->
  <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE"> -->

  <!-- Google Analytics (GA4) -->
  <!-- TODO: Replace G-XXXXXXXXXX with your GA4 Measurement ID -->
  <!--
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  -->

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page._url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page._url }}">
  <meta property="og:image" content="{{ site.url }}/assets/images/og-share.png">
  <meta property="og:site_name" content="Coach DeForest">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@coachdeforest">
  <meta name="twitter:creator" content="@coachdeforest">
  <meta name="twitter:image" content="{{ site.url }}/assets/images/og-share.png">

  <!-- Theme & Mobile -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">

  <!-- Google Fonts (subset to weights actually used; display=swap to avoid render-block) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="/assets/css/main.css">

  <!-- JSON-LD Structured Data: Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "@id": "https://coachdeforest.com/#lee-deforest",
    "name": "Lee DeForest",
    "alternateName": "Coach DeForest",
    "url": "https://coachdeforest.com/about/",
    "image": "https://coachdeforest.com/assets/images/author-photo.jpg",
    "jobTitle": "Basketball Coach & Author",
    "description": "Basketball coach, 2011 state champion, U.S. Army Reserve veteran, and author of five basketball coaching books.",
    "knowsAbout": [
      "Basketball coaching",
      "Princeton Offense",
      "Dribble Drive Motion Offense",
      "Youth basketball player development",
      "Basketball practice planning"
    ],
    "sameAs": [
      "https://x.com/coachdeforest",
      "https://www.amazon.com/Lee-DeForest/e/B072HRC9C1",
      "https://coachprincetonbasketball.com/",
      "https://floridacoastalprep.com/"
    ]
  }
  </script>

  <!-- JSON-LD Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": "https://coachdeforest.com/#website",
    "name": "Coach DeForest",
    "url": "https://coachdeforest.com",
    "description": "Basketball coaching wisdom distilled into books that transform the way you think about the game.",
    "author": {"@id": "https://coachdeforest.com/#lee-deforest"}
  }
  </script>

  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Coach Lee DeForest",
    "url": "https://coachdeforest.com/",
    "logo": "https://coachdeforest.com/assets/images/favicon.svg",
    "description": "Author and basketball coach. Publisher of best-selling coaching playbooks on Amazon.",
    "sameAs": [
      "https://www.amazon.com/stores/Lee-DeForest/author/B072HRC9C1",
      "https://x.com/coachdeforest",
      "https://coachprincetonbasketball.com/",
      "https://floridacoastalprep.com/"
    ]
  }
  </script>

  {% feed_meta %}
</head>
<body>
  {% include header.html %}

  {% if page.full_width %}
  <main>
    {{ content }}
  </main>
  {% else %}
  <div class="page-grid">
    <aside class="col-left" aria-label="Books by Coach DeForest">
      {% include sidebar-books.html %}
    </aside>
    <main class="col-main">
      {{ content }}
    </main>
    <aside class="col-right" aria-label="Sidebar">
      {% include sidebar-widgets.html %}
    </aside>
  </div>
  {% endif %}

  {% include footer.html %}

  {% include exit-intent.html %}

  <script src="/assets/js/main.js"></script>
</body>
</html>
