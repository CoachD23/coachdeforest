name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./_site
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions: ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Ping IndexNow (Bing / Yandex / etc.)
        run: |
          python3 - <<'PYEOF'
          import json, re, urllib.request, urllib.error, sys
          KEY = "b6d0e660cc4f593485ba2389d01c092f"
          HOST = "coachdeforest.com"
          sitemap = urllib.request.urlopen(f"https://{HOST}/sitemap.xml", timeout=20).read().decode("utf-8", "ignore")
          urls = re.findall(r"<loc>(.*?)</loc>", sitemap)
          urls = [u for u in urls if HOST in u][:10000]
          payload = {
              "host": HOST,
              "key": KEY,
              "keyLocation": f"https://{HOST}/{KEY}.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"IndexNow status: {resp.status} ({len(urls)} URLs submitted)")
          except urllib.error.HTTPError as e:
              print(f"IndexNow HTTP {e.code}: {e.reason}")
              sys.exit(0)  # don't fail the workflow over IndexNow
          except urllib.error.URLError as e:
              print(f"IndexNow network error: {e}")
              sys.exit(0)
          PYEOF
        continue-on-error: true
